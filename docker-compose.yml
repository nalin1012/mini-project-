version: "3.8"

services:
  # Backend Service
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - ENVIRONMENT=development
      - DATABASE_URL=sqlite:///./learning_platform.db
      - CORS_ORIGINS=http://localhost:3000,http://localhost:3001
      - FRONTEND_URL=http://localhost:3000
      - JWT_SECRET=dev-secret-key-change-in-production
      - GOOGLE_API_KEY=${GOOGLE_API_KEY}
      - FIREBASE_DATABASE_URL=${FIREBASE_DATABASE_URL}
    volumes:
      - ./backend:/app
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    networks:
      - app-network
    depends_on:
      - db

  # Frontend Service (for reference - normally run separately with npm)
  frontend:
    image: node:18-alpine
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
      - NEXT_PUBLIC_ENVIRONMENT=development
      - PORT=3000
    volumes:
      - ./frontend:/app
      - /app/node_modules
    working_dir: /app
    command: sh -c "npm install && npm run dev"
    networks:
      - app-network

  # Database Service (PostgreSQL - optional for production)
  # Uncomment to use PostgreSQL instead of SQLite
  # db:
  #   image: postgres:15-alpine
  #   environment:
  #     - POSTGRES_USER=learning_user
  #     - POSTGRES_PASSWORD=secure_password
  #     - POSTGRES_DB=learning_platform
  #   ports:
  #     - "5432:5432"
  #   volumes:
  #     - postgres_data:/var/lib/postgresql/data
  #   networks:
  #     - app-network
  #   healthcheck:
  #     test: ["CMD-SHELL", "pg_isready -U learning_user"]
  #     interval: 10s
  #     timeout: 5s
  #     retries: 5

  # SQLite Database (default for development)
  db:
    image: alpine:latest
    volumes:
      - ./backend:/app
    networks:
      - app-network

volumes:
  # postgres_data:

networks:
  app-network:
    driver: bridge
